# OpenSpec Configuration — Pokelike Reborn
schema: spec-driven

context: |
  Tech stack: TypeScript, ES2020, npm workspaces monorepo
  Architecture: Pure TS core (zero deps) + Vite React frontend + Fastify server
  Testing: None yet (greenfield)
  Style: Strict mode TypeScript, ES modules, functional where feasible

rules:
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns
    tdd: false
    test_command: ""
  verify:
    test_command: ""
    build_command: tsc --noEmit
    coverage_threshold: 0
